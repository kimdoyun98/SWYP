name: Deploy Dev Android

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    name: Firebase App Distribution
    runs-on: ubuntu-latest

    environment:
      name: dev

    steps:
      - name: Checkout 코드
        uses: actions/checkout@v4

      - name: JDK 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Gradle 캐시
        uses: gradle/gradle-build-action@v2

      - name: local.properties 생성
        run: touch local.properties

      - name: gradlew 권한 부여
        run: chmod +x gradlew

      - name: APK 생성
        run: ./gradlew assembleDebug

      - name: Firebase App Distribution 배포
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: app/build/outputs/apk/debug/app-debug.apk

      - name: Discord 알림
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_ANDROID_WEBHOOK_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          curl \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"content\": \"@everyone\",
              \"embeds\": [
                {
                  \"title\": \"$COMMIT_MESSAGE\",
                  \"description\": \"QA 검증을 진행해주세요.\",
                  \"fields\": [
                    {
                      \"name\": \"Firebase App Distribution\",
                      \"value\": \"배포 링크\"
                    }
                  ],
                  \"footer\": {
                    \"text\": \"Dev Branch Deploy\"
                  }
                }
              ]
            }" \
            "$DISCORD_ANDROID_WEBHOOK_URL"
